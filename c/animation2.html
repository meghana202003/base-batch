<!DOCTYPE html>
<html>
<head>
<title>Animated Scene</title>

<style>

body{
background:#cceeff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.scene{
width:700px;
height:400px;
border:3px solid black;
background:linear-gradient(#87CEEB 60%, #66cc66 40%);
position:relative;
overflow:hidden;
}

/* Clouds */
.cloud{
position:absolute;
top:40px;
width:100px;
height:40px;
background:white;
border-radius:50px;
animation:cloudMove 25s linear infinite;
}

.cloud:before,.cloud:after{
content:'';
position:absolute;
background:white;
width:60px;
height:40px;
border-radius:50%;
top:-15px;
}

.cloud:before{left:10px;}
.cloud:after{right:10px;}

@keyframes cloudMove{
0%{left:-120px;}
100%{left:720px;}
}

/* Birds */
.birds{
position:absolute;
top:90px;
font-size:20px;
animation:birdFly 10s linear infinite;
}

@keyframes birdFly{
0%{left:-50px;}
100%{left:750px;}
}

/* Water */
.water{
position:absolute;
right:0;
bottom:80px;
width:200px;
height:80px;
background:#3399ff;
}

/* Boat */
.boat{
position:absolute;
right:100px;
bottom:140px;
width:60px;
height:20px;
background:brown;
border-radius:0 0 20px 20px;
animation:boatFloat 3s infinite alternate;
}

@keyframes boatFloat{
0%{transform:translateY(0);}
100%{transform:translateY(-10px);}
}

/* Road */
.road{
position:absolute;
bottom:0;
width:100%;
height:80px;
background:gray;
z-index:1;
}

/* Car */
.car{
position:absolute;
bottom:30px;
left:-80px;
width:60px;
height:25px;
background:red;
border-radius:5px;
animation:carMove 8s linear infinite;
z-index:2;
}

.car:before,.car:after{
content:'';
position:absolute;
bottom:-10px;
width:12px;
height:12px;
background:black;
border-radius:50%;
}

.car:before{left:8px;}
.car:after{right:8px;}

@keyframes carMove{
0%{left:-80px;}
100%{left:750px;}
}
/* Bike */
.bike{
position:absolute;
bottom:28px;
right:-80px;
animation:bikeMove 10s linear infinite;
z-index:2;
}

.bike .wheel{
width:15px;
height:15px;
border:3px solid black;
border-radius:50%;
display:inline-block;
}

@keyframes bikeMove{
0%{right:-80px;}
100%{right:750px;}
}

</style>
</head>

<body>

<div class="scene">

<div class="cloud"></div>
<div class="cloud" style="top:70px; animation-delay:5s;"></div>

<div class="birds">V V V</div>

<div class="water"></div>
<div class="boat"></div>

<div class="road"></div>

<div class="car" ></div>
<hr text-align:dashed>


<div class="bike">
<div class="wheel"></div>
<div class="wheel"></div>
</div>

</div>

</body>
</html>
