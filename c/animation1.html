<!DOCTYPE html>
<html>
<head>
<title>Animated Scene</title>

<style>

body{
background:#cceeff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.scene{
width:700px;
height:400px;
border:3px solid black;
background:linear-gradient(#87CEEB 60%, #66cc66 40%);
position:relative;
overflow:hidden;
}

/* Blinking animation */
@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

/* Clouds */
.cloud{
position:absolute;
top:40px;
width:80px;
height:35px;
background:white;
border-radius:50px;
animation:blink 2s infinite;
}

.cloud1{left:120px;}
.cloud2{left:300px;}
.cloud3{left:480px;}

.cloud:before,.cloud:after{
content:'';
position:absolute;
background:white;
width:50px;
height:35px;
border-radius:50%;
top:-12px;
}

.cloud:before{left:8px;}
.cloud:after{right:8px;}

/* Birds */
.birds{
position:absolute;
top:110px;
left:50%;
transform:translateX(-50%);
font-size:22px;
animation:blink 2s infinite;
}

/* Water */
.water{
position:absolute;
right:0;
bottom:80px;
width:200px;
height:80px;
background:#3399ff;
}

/* Boat animation */
.boat{
position:absolute;
bottom:130px;
width:60px;
height:20px;
background:brown;
border-radius:0 0 20px 20px;
animation:boatMove 6s linear infinite;
}

@keyframes boatMove{
0%{left:500px;}
100%{left:620px;}
}

/* Road */
.road{
position:absolute;
bottom:0;
width:100%;
height:80px;
background:gray;
}

/* Dashed line */
.dashed{
position:absolute;
bottom:40px;
width:100%;
border-bottom:4px dashed white;
}
hr

/* Car moving in a staright way */
.car{
position:absolute;
bottom:35px;
left:280px;
width:60px;
height:25px;
background:red;
border-radius:5px;
animation:carMove 8s linear infinite;

}

.car:before,.car:after{
content:'';
position:absolute;
bottom:-10px;
width:12px;
height:12px;
background:black;
border-radius:50%;
}

.car:before{left:8px;}
.car:after{right:8px;}
@keyframes carMove{
0%{left:-60px;}
100%{left:760px;}
}


/* Bike */
.bike{
position:absolute;
bottom:30px;
right:-60px;
animation:bikeMove 8s linear infinite;
}

.wheel{
width:16px;
height:16px;
border:3px solid black;
border-radius:50%;
display:inline-block;
}

/* Bike moving opposite direction */
@keyframes bikeMove{
0%{right:-60px;}
100%{right:760px;}
}

</style>

</head>

<body>

<div class="scene">

<!-- Clouds -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<!-- Birds -->
<div class="birds">V V V</div>

<!-- Water -->
<div class="water"></div>

<!-- Boat -->
<div class="boat"></div>

<!-- Road -->
<div class="road"></div>

<!-- Dashed road line -->
<div class="dashed"></div>

<!-- Car -->
<div class="car"></div>

<!-- Bike -->
<div class="bike">
<div class="wheel"></div>
<div class="wheel"></div>
</div>

</div>

</body>
</html>
