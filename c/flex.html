<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body>main:nth-child(1)
        {
            background-color: black;
            height: 500px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            column-gap: 20px;
            row-gap: 20px;
            gap:15px 20px;

            
        }
        body>main>div{
            background-color: aqua;
            border:2px solid white;
            height: 100px;
            width:100px;
        }
        main>div:nth-child(1){
            order:4;
        }
        main>div:nth-child(2){
            order:3;
        }
        main>div:nth-child(3){
order:5;
flex-grow: 1;
        }
        main>div:nth-child(4){
            order:1;
            flex-grow: 1;
            align-self: flex-end;
        }
        main>div:nth-child(5)
{
    order:2;
    flex-grow:1;
    align-self: flex-start;
    flex-shrink: 15;
}
    </style>
</head>
<body>
    <main>
        <div>flex-items1</div>
        <div>flex-items2</div>
        <div>flex-items3</div>
        <div>flex-items4</div>
        <div>flex-items5</div>
    </main>
    <!-- column css
    flex-direction: column;
            justify-content:space-between;
            align-items:end;
     -->
</body>
</html>
