<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      width: 350px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    .input-box {
      display: flex;
      margin-bottom: 15px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      margin-bottom: 5px;
      background: #f9f9f9;
      border-radius: 5px;
    }

    .delete {
      color: red;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Todo List</h2>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Enter Task">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
  function addTask() {
    let input = document.getElementById("taskInput");
    let taskText = input.value.trim();

    if (taskText === "") {
      alert("Enter a task!");
      return;
    }

    let li = document.createElement("li");

    li.innerHTML = `
      ${taskText}
      <span class="delete" onclick="deleteTask(this)">❌</span>
    `;

    document.getElementById("taskList").appendChild(li);

    input.value = "";
  }

  function deleteTask(element) {
    element.parentElement.remove();
  }
</script>

</body>
</html>
